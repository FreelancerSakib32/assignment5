<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f6f8fa] font-sans min-h-screen text-gray-800 overflow-x-hidden">

    <div id="login-section" class="h-screen flex items-center justify-center px-4">
        <div class="card w-full max-w-sm sm:max-w-md bg-white shadow-xl p-6 sm:p-8 border border-gray-200">
            <div class="flex flex-col items-center">
                <img src="./assets/github-logo.png" alt="Logo" class="w-14 h-14 sm:w-16 sm:h-16 mb-4">
                <h2 class="text-xl sm:text-2xl font-bold">Sign In</h2>
                <p class="text-gray-500 mb-6 text-xs sm:text-sm text-center">Welcome to GitHub Issues Tracker</p>
            </div>

            <div class="form-control w-full mb-4">
                <label class="label"><span class="label-text font-bold text-gray-700">Username</span></label>
                <input type="text" id="username" placeholder="Enter admin" class="input input-bordered w-full bg-gray-50 focus:bg-white" />
            </div>

            <div class="form-control w-full mb-6">
                <label class="label"><span class="label-text font-bold text-gray-700">Password</span></label>
                <input type="password" id="password" placeholder="Enter admin123" class="input input-bordered w-full bg-gray-50 focus:bg-white" />
            </div>

            <button id="login-btn" class="btn bg-[#2da44e] hover:bg-[#2c974b] text-white w-full border-none">Sign In</button>
            
            <div class="bg-gray-50 p-4 rounded-lg text-sm text-center border mt-4">
                <p class="font-bold mb-1">Demo Credentials:</p>
                <p>Username: <span class="text-blue-600 font-semibold">admin</span></p>
                <p>Password: <span class="text-blue-600 font-semibold">admin123</span></p>
            </div>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        
        <div class="navbar bg-white shadow-sm px-4 sm:px-6 py-3 border-b border-gray-200 flex flex-col sm:flex-row gap-3 sm:gap-0">
            <div class="flex-1 flex items-center justify-center sm:justify-start gap-3 w-full sm:w-auto">
                <img src="./assets/github-logo.png" alt="Logo" class="w-7 h-7 sm:w-8 sm:h-8 opacity-90">
                <a class="text-lg sm:text-xl font-bold text-gray-900">Issues Tracker</a>
            </div>
            <div class="flex-none flex w-full sm:w-auto gap-2 items-center">
                <div class="form-control relative flex-1 sm:w-64">
                    <input type="text" id="search-input" placeholder="Search issues..." class="input input-sm input-bordered w-full bg-gray-50 pr-16" />
                    <button id="search-btn" class="btn btn-sm absolute right-0 rounded-l-none bg-gray-200 border-gray-300">Search</button>
                </div>
                <button id="logout-btn" class="btn btn-sm btn-outline btn-error">Logout</button>
            </div>
        </div>

        <div class="container mx-auto px-4 sm:px-6 py-6 sm:py-8">
            
            <div class="flex justify-center mb-6 sm:mb-8">
                <div class="join border border-gray-300 rounded-lg">
                    <button class="join-item btn btn-sm sm:btn-md tab-btn bg-white hover:bg-gray-100 border-none px-4 sm:px-6 text-xs sm:text-sm" data-tab="all">All</button>
                    <button class="join-item btn btn-sm sm:btn-md tab-btn bg-white hover:bg-gray-100 border-none px-4 sm:px-6 text-xs sm:text-sm" data-tab="open">Open</button>
                    <button class="join-item btn btn-sm sm:btn-md tab-btn bg-white hover:bg-gray-100 border-none px-4 sm:px-6 text-xs sm:text-sm" data-tab="closed">Closed</button>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6 gap-3 sm:gap-0">
                <div class="flex items-center gap-3 text-gray-700">
                    <img src="./assets/Aperture.png" class="w-5 h-5 opacity-70">
                    <span id="issue-count" class="font-bold text-lg">0</span>
                    <span class="text-sm font-medium">Issues found</span>
                </div>
                <div class="flex gap-4 sm:gap-6 text-sm font-semibold text-gray-600">
                    <div class="flex items-center gap-2"><img src="./assets/Open-Status.png" class="w-4 h-4"> Open</div>
                    <div class="flex items-center gap-2"><img src="./assets/Closed- Status .png" class="w-4 h-4"> Closed</div>
                </div>
            </div>

            <div id="loading-spinner" class="hidden text-center py-16">
                <div class="loader"></div>
                <p class="mt-4 text-gray-500 font-medium">Loading issues...</p>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 pb-12">
                </div>
        </div>

        <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box w-full sm:w-11/12 max-w-2xl bg-white rounded-t-2xl sm:rounded-xl">
                <div id="modal-content"></div>
            </div>
        </dialog>
    </div>

    <script src="app.js"></script>
</body>
</html>
